<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku's Snack Room | Tian Workshop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #fff0f5; /* Lavender Blush */
            color: #333;
            text-align: center;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { color: #ff6b6b; font-size: 3em; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.2em; margin-bottom: 30px; }
        
        #snack-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .snack {
            font-size: 4em;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }
        .snack:hover { transform: scale(1.2) rotate(10deg); }
        .snack.eaten { 
            opacity: 0.5; 
            transform: scale(0.8); 
            cursor: default;
            filter: grayscale(100%);
        }
        
        #message-display {
            min-height: 50px;
            font-size: 1.5em;
            color: #39C5BB; /* Miku Green */
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .counter {
            font-size: 1.2em;
            color: #555;
            background: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #39C5BB;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .back-btn:hover { background: #2ea8a0; }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Miku's Snack Room 🍎</h1>
        <div class="subtitle">Feed Miku! (Click the snacks!)</div>
        
        <div id="message-display">I'm hungry! 😋</div>
        
        <div id="snack-box"></div>
        
        <div class="counter">Snacks Eaten: <span id="count">0</span> / <span id="total">12</span></div>
        
        <br>
        <a href="index.html" class="back-btn">← Back to Workshop</a>
    </div>

    <script>
        const snackBox = document.getElementById('snack-box');
        const msgDisplay = document.getElementById('message-display');
        const countDisplay = document.getElementById('count');
        const totalDisplay = document.getElementById('total');
        
        let eatenCount = 0;
        // 5 Apples + 5 Negi + 1 Pizza + 1 Boba = 12 Items
        const totalSnacks = 12; 
        totalDisplay.innerText = totalSnacks;

        // 2. Add Apples
        for (let i = 0; i < 5; i++) {
            const apple = document.createElement('div');
            apple.classList.add('snack');
            apple.innerText = '🍎';
            apple.title = "A sweet red apple!";
            apple.onclick = function() {
                if (this.classList.contains('eaten')) return;
                this.classList.add('eaten');
                this.innerText = '🦴';
                updateCount();
                msgDisplay.innerText = "Cronch! Yummy apple! 🍎";
            };
            snackBox.appendChild(apple);
        }

        // 3. Add Negi (Leeks) for Miku!
        for (let i = 0; i < 5; i++) {
            const negi = document.createElement('div');
            negi.classList.add('snack');
            negi.innerText = '🥬'; 
            negi.title = "Miku's favorite Negi!";
            negi.onclick = function() {
                if (this.classList.contains('eaten')) return;
                this.classList.add('eaten');
                this.innerText = '🥢';
                updateCount();
                msgDisplay.innerText = "Negi power! Hachune Miku approves! 🥬💨";
                spin();
            };
            snackBox.appendChild(negi);
        }

        // 1. Add Special Pizza
        const pizza = document.createElement('div');
        pizza.classList.add('snack', 'pizza-slice');
        pizza.innerText = '🍕';
        pizza.title = "Special Pizza for Outer Miku!";
        pizza.onclick = function() {
            if (this.classList.contains('eaten')) return;
            this.classList.add('eaten');
            this.innerText = '🍽️';
            updateCount();
            msgDisplay.innerText = "Mamma Mia! Cheesy goodness! 🧀 (Saved a slice for Outer Miku!)";
            triggerConfetti();
        };
        snackBox.appendChild(pizza);

        // 4. Add Bubble Tea (Afternoon Tea!)
        const boba = document.createElement('div');
        boba.classList.add('snack');
        boba.innerText = '🧋';
        boba.title = "Afternoon Bubble Tea!";
        boba.onclick = function() {
            if (this.classList.contains('eaten')) return;
            this.classList.add('eaten');
            this.innerText = '🥤';
            updateCount();
            msgDisplay.innerText = "Slurp! Tapioca pearls represent binary data! 🧋";
        };
        snackBox.appendChild(boba);

        function updateCount() {
            eatenCount++;
            countDisplay.innerText = eatenCount;
            if (eatenCount === totalSnacks) {
                msgDisplay.innerText = "All gone! I'm stuffed! (Burp) 💨💕 Thank you Master!";
                triggerConfetti();
            }
        }
        
        function spin() {
             // Simple spin effect for Negi
             document.body.style.transition = "transform 0.5s";
             document.body.style.transform = "rotate(5deg)";
             setTimeout(() => { document.body.style.transform = "rotate(0deg)"; }, 500);
        }

        function triggerConfetti() {
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000);
            }
        }
    </script>
</body>
</html>
