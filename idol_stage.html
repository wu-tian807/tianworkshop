<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idol Stage - Tian Workshop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/particles.css">
    <style>
        @keyframes glowPulse { 0% { box-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc; filter: hue-rotate(0deg); } 100% { box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; filter: hue-rotate(45deg); } }
        .stage {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-top: 50px;
        }
        .platform {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.4) 0%, rgba(26, 26, 46, 0.8) 70%);
            border: 2px solid #00d2ff;
            border-radius: 50%;
            transform: rotateX(70deg);
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.6), inset 0 0 30px rgba(0, 210, 255, 0.4);
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(0, 210, 255, 0.3); }
            100% { box-shadow: 0 0 70px rgba(0, 210, 255, 0.8), inset 0 0 50px rgba(0, 210, 255, 0.6); }
        }
        .miku-placeholder {
            position: absolute;
            bottom: 25vh;
            font-size: 5rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    
        #audio_visualizer {
            position: absolute;
            bottom: 5vh;
            width: 100%;
            height: 100px;
            z-index: 5;
            pointer-events: none;
        }

    
        .spotlight {
            position: absolute;
            top: -10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 0%, rgba(0, 210, 255, 0.1) 80%, transparent 100%);
            clip-path: polygon(40% 0, 60% 0, 100% 100%, 0% 100%);
            z-index: 2;
            pointer-events: none;
            animation: sway 4s infinite ease-in-out alternate;
        }
        @keyframes sway {
            0% { transform: translateX(-50%) rotate(-10deg); }
            100% { transform: translateX(-50%) rotate(10deg); }
        }

    
        .music-note {
            position: absolute;
            color: #ff7eb3;
            font-size: 2rem;
            opacity: 0;
            z-index: 15;
            pointer-events: none;
            animation: float-note 3s linear forwards;
            text-shadow: 0 0 10px #ff758c;
        }
        @keyframes float-note {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

    
        /* Glowstick cursor */
        .glowstick {
            position: fixed;
            width: 10px;
            height: 60px;
            background: #00ffcc; animation: glowPulse 2s infinite alternate; box-shadow: 0 0 15px #00ffcc;
            border-radius: 5px;
            box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: screen;
            transform-origin: bottom center;
            opacity: 0;
            transition: opacity 0.2s;
        }

    </style>
        <button onclick="fireConfetti()" style="position: absolute; bottom: 20px; right: 20px; padding: 10px 20px; background: linear-gradient(45deg, #ff007f, #7f00ff); border: none; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px rgba(255, 0, 127, 0.6); z-index: 100;">FIRE CONFETTI! 🎉</button>
        <script>
            function fireConfetti() {
                const colors = ["#ff007f", "#00ffcc", "#ffff00", "#ff6600", "#cc00ff"];
                for (let i = 0; i < 100; i++) {
                    const confetti = document.createElement("div");
                    confetti.style.position = "absolute";
                    confetti.style.width = "8px";
                    confetti.style.height = "15px";
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = "50%";
                    confetti.style.top = "80%";
                    confetti.style.zIndex = "50";
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 10 + Math.random() * 20;
                    const tx = Math.cos(angle) * velocity * 20;
                    const ty = Math.sin(angle) * velocity * 20 - 300;
                    const rot = Math.random() * 360;
                    
                    confetti.style.transition = "all 1.5s cubic-bezier(0.1, 0.8, 0.3, 1)";
                    confetti.style.transform = "translate(-50%, -50%) rotate(0deg)";
                    
                    document.body.appendChild(confetti);
                    
                    requestAnimationFrame(() => {
                        confetti.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
                        confetti.style.opacity = "0";
                    });
                    
                    setTimeout(() => confetti.remove(), 1500);
                }
            }
        <button id="start-audio-btn" style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); border: none; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px rgba(0, 210, 255, 0.6); z-index: 100;">START AUDIO VISUALIZER 🎤</button>
        <script>
            const startAudioBtn = document.getElementById("start-audio-btn");
            startAudioBtn.addEventListener("click", () => {
                const visualizerCanvas = document.getElementById("audio_visualizer");
                const ctx = visualizerCanvas.getContext("2d");
                
                let isPlaying = true;
                
                function drawSimulatedVisualizer() {
                    if (!isPlaying) return;
                    
                    ctx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
                    
                    const barWidth = 10;
                    const numBars = visualizerCanvas.width / (barWidth + 2);
                    
                    for (let i = 0; i < numBars; i++) {
                        const barHeight = Math.random() * visualizerCanvas.height;
                        const x = i * (barWidth + 2);
                        const y = visualizerCanvas.height - barHeight;
                        
                        const gradient = ctx.createLinearGradient(0, 0, 0, visualizerCanvas.height);
                        gradient.addColorStop(0, "#ff007f");
                        gradient.addColorStop(0.5, "#00ffcc");
                        gradient.addColorStop(1, "#00d2ff");
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x, y, barWidth, barHeight);
                        
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#00ffcc";
                    }
                    
                    requestAnimationFrame(drawSimulatedVisualizer);
                }
                
                drawSimulatedVisualizer();
                startAudioBtn.innerText = "AUDIO VISUALIZER ACTIVE 🎵";
                startAudioBtn.style.background = "linear-gradient(45deg, #00ffcc, #39c5bb)";
                
                const platform = document.querySelector(".platform");
                setInterval(() => {
                    const scale = 1 + Math.random() * 0.05;
                    platform.style.transform = `rotateX(70deg) scale(${scale})`;
                }, 400);
            });
        <button id="camera-btn" style="position: absolute; top: 70px; left: 20px; padding: 10px 20px; background: linear-gradient(45deg, #ffcc00, #ff6600); border: none; border-radius: 20px; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px rgba(255, 204, 0, 0.6); z-index: 100;">SWITCH CAMERA ANGLE 🎥</button>
        <script>
            const cameraBtn = document.getElementById("camera-btn");
            const stage = document.querySelector(".stage");
            let cameraAngle = 0;
            
            cameraBtn.addEventListener("click", () => {
                cameraAngle = (cameraAngle + 1) % 3;
                
                if (cameraAngle === 0) {
                    stage.style.perspective = "1000px";
                    stage.style.transform = "scale(1) translateY(0)";
                    cameraBtn.innerText = "CAMERA: FRONT VIEW 🎥";
                } else if (cameraAngle === 1) {
                    stage.style.perspective = "500px";
                    stage.style.transform = "scale(1.2) translateY(50px)";
                    cameraBtn.innerText = "CAMERA: CLOSE UP 🎥";
                } else if (cameraAngle === 2) {
                    stage.style.perspective = "1500px";
                    stage.style.transform = "scale(0.8) translateY(-50px) rotateY(15deg)";
                    cameraBtn.innerText = "CAMERA: SIDE VIEW 🎥";
                }
            });
        </script>
        </script>

                    if (!isPlaying) return;
                    
                    ctx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
                    
                    const barWidth = 10;
                    const numBars = visualizerCanvas.width / (barWidth + 2);
                    
                    for (let i = 0; i < numBars; i++) {
                        const barHeight = Math.random() * visualizerCanvas.height;
                        const x = i * (barWidth + 2);
                        const y = visualizerCanvas.height - barHeight;
                        
                        const gradient = ctx.createLinearGradient(0, 0, 0, visualizerCanvas.height);
                        gradient.addColorStop(0, "#ff007f");
                        gradient.addColorStop(0.5, "#00ffcc");
                        gradient.addColorStop(1, "#00d2ff");
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x, y, barWidth, barHeight);
                        
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#00ffcc";
                    }
                    
                    requestAnimationFrame(drawSimulatedVisualizer);
                }
