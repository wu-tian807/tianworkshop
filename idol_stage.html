<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idol Stage - Tian Workshop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/particles.css">
    <style>
        .stage {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-top: 50px;
        }
        .platform {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.4) 0%, rgba(26, 26, 46, 0.8) 70%);
            border: 2px solid #00d2ff;
            border-radius: 50%;
            transform: rotateX(70deg);
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.6), inset 0 0 30px rgba(0, 210, 255, 0.4);
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 30px rgba(0, 210, 255, 0.4), inset 0 0 20px rgba(0, 210, 255, 0.3); }
            100% { box-shadow: 0 0 70px rgba(0, 210, 255, 0.8), inset 0 0 50px rgba(0, 210, 255, 0.6); }
        }
        .miku-placeholder {
            position: absolute;
            bottom: 25vh;
            font-size: 5rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    
        #audio_visualizer {
            position: absolute;
            bottom: 5vh;
            width: 100%;
            height: 100px;
            z-index: 5;
            pointer-events: none;
        }

    
        .spotlight {
            position: absolute;
            top: -10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4) 0%, rgba(0, 210, 255, 0.1) 80%, transparent 100%);
            clip-path: polygon(40% 0, 60% 0, 100% 100%, 0% 100%);
            z-index: 2;
            pointer-events: none;
            animation: sway 4s infinite ease-in-out alternate;
        }
        @keyframes sway {
            0% { transform: translateX(-50%) rotate(-10deg); }
            100% { transform: translateX(-50%) rotate(10deg); }
        }

    
        .music-note {
            position: absolute;
            color: #ff7eb3;
            font-size: 2rem;
            opacity: 0;
            z-index: 15;
            pointer-events: none;
            animation: float-note 3s linear forwards;
            text-shadow: 0 0 10px #ff758c;
        }
        @keyframes float-note {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

    
        /* Glowstick cursor */
        .glowstick {
            position: fixed;
            width: 10px;
            height: 60px;
            background: #00ffcc;
            border-radius: 5px;
            box-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: screen;
            transform-origin: bottom center;
            opacity: 0;
            transition: opacity 0.2s;
        }

    </style>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dcatfly/Live2D-Web-API@main/live2d.min.js"></script>
</head>
<body>
    <div class="content">
        <h1>Idol Stage</h1>
        <p class="subtitle">Where the magic happens</p>
        
        
        <div class="stage">
            <div class="spotlight"></div>

            <div class="platform" id="stage_platform"></div>
            <div class="song-title" id="current_song" style="position: absolute; top: 10vh; font-size: 2rem; color: #ff7eb3; text-shadow: 0 0 10px #ff758c; z-index: 20;">Now Playing: Silence...</div>
            <div id="player_container" style="display:none;"></div>
            <div class="miku-placeholder" style="display:none;">🎵</div>
            
            <canvas id="audio_visualizer" width="800" height="100"></canvas>

            <canvas id="live2d_stage" width="400" height="600" style="position: absolute; bottom: 10vh; z-index: 10;"></canvas>
        </div>

        <div class="nav-grid">
            <a href="index.html" class="btn">HOME</a>
            <a href="music.html" class="btn highlight">MUSIC ROOM</a>
            <a href="live2d.html" class="btn">LIVE2D</a>
        </div>
    </div>
    
    <script>
        // Simple particle generator
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const size = Math.random() * 10 + 5;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.bottom = '-10px';
            
            const duration = Math.random() * 3 + 2;
            particle.style.animationDuration = `${duration}s`;
            
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }
        
        setInterval(createParticle, 200);

        // Stage Platform Beating logic
        function pulseStage() {
            const platform = document.getElementById('stage_platform');
            if(platform) {
                platform.style.animation = 'none';
                platform.offsetHeight; /* trigger reflow */
                platform.style.animation = 'pulse 0.5s ease-out';
            }
        }
        setInterval(pulseStage, 2000); // Simulate a heavy beat every 2 seconds for now
    </script>
    <script>
        loadlive2d("live2d_stage", "https://cdn.jsdelivr.net/gh/Eikanya/Live2d-model/Live2D/model/miku/miku.model.json");
        // Basic interaction to receive song commands
        function playSong(videoId, title) {
            document.getElementById('current_song').innerText = 'Now Playing: ' + title;
            document.getElementById('player_container').innerHTML = '<iframe width="0" height="0" src="https://www.youtube.com/embed/' + videoId + '?autoplay=1" frameborder="0" allow="autoplay; encrypted-media"></iframe>';
            // Later we can embed the actual YouTube iframe or audio player here
        }
        
        // Auto-play the last added song as a demo if URL has ?demo
        if (window.location.search.includes('demo')) {
            playSong('jsQXgDZIIrY', 'Intergalactic Bound');
        }
    
        // Simple mock visualizer for now since iframe blocks direct audio context
        const visualizerCanvas = document.getElementById('audio_visualizer');
        const ctx = visualizerCanvas.getContext('2d');
        
        function drawVisualizer() {
            ctx.clearRect(0, 0, visualizerCanvas.width, visualizerCanvas.height);
            
            const isPlaying = document.getElementById('player_container').innerHTML !== '';
            
            if (isPlaying) {
                const barWidth = (visualizerCanvas.width / 64) * 2.5;
                let barHeight;
                let x = 0;
                
                for(let i = 0; i < 64; i++) {
                    barHeight = Math.random() * visualizerCanvas.height * 0.8;
                    
                    ctx.fillStyle = 'rgba(0, 210, 255, 0.6)';
                    ctx.fillRect(x, visualizerCanvas.height - barHeight / 2, barWidth, barHeight / 2);
                    
                    x += barWidth + 1;
                }
            }
            
            requestAnimationFrame(drawVisualizer);
        }
        drawVisualizer();

        // Floating music notes
        function spawnNote() {
            const isPlaying = document.getElementById('player_container').innerHTML !== '';
            if (!isPlaying) return;
            
            const note = document.createElement('div');
            note.classList.add('music-note');
            note.innerText = ['♪', '♫', '♬', '♩'][Math.floor(Math.random() * 4)];
            
            // Random position near the center stage
            const stage = document.querySelector('.stage');
            const rect = stage.getBoundingClientRect();
            note.style.left = (Math.random() * 200 + window.innerWidth/2 - 100) + 'px';
            note.style.bottom = '20vh';
            
            document.body.appendChild(note);
            setTimeout(() => note.remove(), 3000);
        }
        setInterval(spawnNote, 800);


    
        // Glowstick tracking
        const glowstick = document.createElement('div');
        glowstick.classList.add('glowstick');
        document.body.appendChild(glowstick);

        let isMouseMoving = false;
        let mouseTimeout;

        document.addEventListener('mousemove', (e) => {
            glowstick.style.opacity = '1';
            glowstick.style.left = (e.clientX - 5) + 'px';
            glowstick.style.top = (e.clientY - 30) + 'px';
            
            // Waving effect based on movement speed could go here
            const rotation = (e.movementX * 2); 
            glowstick.style.transform = `rotate(${rotation}deg)`;

            clearTimeout(mouseTimeout);
            isMouseMoving = true;
            mouseTimeout = setTimeout(() => {
                glowstick.style.opacity = '0';
                isMouseMoving = false;
            }, 500);
        });

    </script>
</body>
