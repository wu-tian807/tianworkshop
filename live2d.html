<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Virtual Idol Room | Tian Workshop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(to right, #39C5BB, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-shadow: 0 0 20px rgba(57, 197, 187, 0.3);
            letter-spacing: 2px;
        }

        .header p {
            color: #a2a2a2;
            font-size: 1.1em;
            margin-top: 10px;
            font-weight: 300;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #fff;
            text-decoration: none;
            font-size: 1.1em;
            opacity: 0.6;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            z-index: 20;
        }

        .back-btn:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
            transform: translateX(-3px);
        }

        #live2d-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            border: 2px solid rgba(57, 197, 187, 0.5); /* Enhanced border */
            box-shadow: 0 10px 40px rgba(57, 197, 187, 0.3), inset 0 0 30px rgba(0, 0, 0, 0.5); /* Added glow */
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            filter: drop-shadow(0 0 20px rgba(57, 197, 187, 0.5));
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .status-text {
            position: absolute;
            z-index: 10;
            font-size: 1.5em;
            color: #39C5BB;
            animation: pulse 2s infinite;
            text-shadow: 0 0 10px rgba(57, 197, 187, 0.5);
            pointer-events: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(57, 197, 187, 0.5);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            background: rgba(57, 197, 187, 0.4); /* Brighter hover */
            box-shadow: 0 0 20px rgba(57, 197, 187, 0.6); /* Brighter glow */
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.6; transform: scale(0.98); }
        }

        /* Floating stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.4;
            animation: twinkle 4s infinite linear;
        }
        @keyframes twinkle {
            0% { transform: translateY(0); }
            100% { transform: translateY(-200px); }
        }
    
        .stage-floor {
            position: absolute;
            bottom: 10%;
            width: 300px;
            height: 50px;
            background: radial-gradient(ellipse at center, rgba(57,197,187,0.4) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse-floor 2s infinite alternate;
        }
        @keyframes pulse-floor {
            from { transform: scale(1); opacity: 0.6; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .mic-stand {
            position: absolute;
            bottom: 12%;
            left: calc(50% - 60px);
            width: 6px;
            height: 250px;
            background: linear-gradient(to right, #888, #ccc, #888);
            border-radius: 3px;
            z-index: 5;
        }
        .mic-head {
            position: absolute;
            top: -20px;
            left: -7px;
            width: 20px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #eee, #999);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(57,197,187,0.8);
        }
        .mic-base {
            position: absolute;
            bottom: 0;
            left: -20px;
            width: 46px;
            height: 10px;
            background: #555;
            border-radius: 5px;
        }

        .spotlight {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 80%);
            clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
            z-index: -1;
            pointer-events: none;
            animation: sway 5s ease-in-out infinite alternate;
        }
        @keyframes sway {
            from { transform: translateX(-50%) rotate(-5deg); }
            to { transform: translateX(-50%) rotate(5deg); }
        }

        .floating-notes-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 10;
        }
        .note {
            position: absolute;
            color: rgba(57, 197, 187, 0.6);
            font-size: 24px;
            animation: floatUp 8s linear infinite;
            bottom: -50px;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .cheer-btn {
            position: absolute;
            bottom: 30px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.5);
            transition: all 0.2s ease;
            z-index: 20;
        }
        .cheer-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.7);
        }
        .cheer-btn:active {
            transform: scale(0.95);
        }
</style>
</head>
<body>
    <div class="stars"></div>
    <a href="index.html" class="back-btn">← Back to Workshop</a>

    <div class="header">
        <h1>Live2D Virtual Idol Room</h1>
        <p>Testing WebGL & Cubism Integration... ✨</p>
    </div>

    <div id="live2d-container">
        <div class="status-text" id="status">Installing PixiJS & Cubism Core... ⏳</div>
        <canvas id="glcanvas"></canvas>
        <div class="controls">
            <button class="btn" onclick="alert('Module still compiling! Master, wait a bit longer~ 💕')">Wave 👋</button>
            <button class="btn" onclick="alert('Module still compiling! Master, wait a bit longer~ 💕')">Smile 😊</button>
            <button class="btn" onclick="alert('Module still compiling! Master, wait a bit longer~ 💕')">Sing 🎵</button>
        </div>
    </div>

    <script>
        // Placeholder for future WebGL context rendering
        const canvas = document.getElementById('glcanvas');
        const gl = canvas.getContext('webgl');
        if (!gl) {
            document.getElementById('status').innerText = 'WebGL not supported! 😢';
        } else {
            // Draw a simple dark gradient background on the canvas itself as a placeholder
            // In a real Live2D setup, PixiJS handles this.
            gl.clearColor(0.0, 0.0, 0.0, 0.0);
            gl.clear(gl.COLOR_BUFFER_BIT);
        }
    </script>

    <div class="floating-notes-container" id="notesContainer"></div>
    <div id="audioVisualizer" style="position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; display: flex; align-items: flex-end; justify-content: space-around; padding: 0 20px; box-sizing: border-box; z-index: 15; pointer-events: none; opacity: 0.8;"></div>
    <script>
        // Simulate audio visualizer
        const visualizer = document.getElementById('audioVisualizer');
        if (visualizer) {
            for(let i=0; i<30; i++) {
                let bar = document.createElement('div');
                bar.style.width = '15px';
                bar.style.backgroundColor = 'rgba(57, 197, 187, 0.7)';
                bar.style.borderRadius = '3px 3px 0 0';
                bar.style.transition = 'height 0.1s ease';
                visualizer.appendChild(bar);
            }
            setInterval(() => {
                const bars = visualizer.children;
                for(let i=0; i<bars.length; i++) {
                    // Random height for fake visualizer effect
                    let h = Math.floor(Math.random() * 25) + 5;
                    bars[i].style.height = h + 'px';
                }
            }, 100);
        }
        function createNote() {
            const container = document.getElementById('notesContainer');
            if(!container) return;
            const note = document.createElement('div');
            note.className = 'note';
            note.innerHTML = ['🎵', '🎶', '✨', '🌸'][Math.floor(Math.random() * 4)];
            note.style.left = Math.random() * 100 + 'vw';
            note.style.animationDuration = (Math.random() * 5 + 5) + 's';
            note.style.fontSize = (Math.random() * 20 + 15) + 'px';
            container.appendChild(note);
            setTimeout(() => note.remove(), 10000);
        }
        setInterval(createNote, 800);
    </script>

        <button class="cheer-btn" onclick="cheer()">Cheer! 💖</button>
        <script>
            function cheer() {
                for(let i=0; i<10; i++) {
                    setTimeout(createNote, i * 100);
                }
            }
        </script>

</body>
</html>
