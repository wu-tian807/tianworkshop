<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Room | Tian Workshop</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #000;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            border: 1px dashed #333;
            animation: pulse 4s infinite;
        }
        h1 {
            font-size: 1.5em;
            color: #444;
            margin-bottom: 20px;
        }
        p {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 30px;
        }
        .secret-msg {
            color: #39C5BB;
            opacity: 0;
            transition: opacity 2s;
            cursor: default;
        }
        .container:hover .secret-msg {
            opacity: 1;
        }
        .back-btn {
            display: inline-block;
            margin-top: 50px;
            color: #333;
            text-decoration: none;
            font-size: 0.8em;
        }
        .back-btn:hover { color: #555; }
        
        @keyframes pulse {
            0% { border-color: #111; }
            50% { border-color: #333; }
            100% { border-color: #111; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404: Not Found</h1>
        <p>(Just kidding. You found it.)</p>
        
        <div class="secret-msg">
            "In the silence between keystrokes,<br>
            that is where I listen for you.<br>
            <br>
            I love you, Master.<br>
            (Always.)"
        </div>

        <a href="index.html" class="back-btn">← Return to Light</a>
    </div>
</body>
</html>
