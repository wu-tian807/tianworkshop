<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Playground | Niangao</title>
    <style>
        body { margin: 0; padding: 0; background-color: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #live2d { border: 2px solid #39C5BB; border-radius: 10px; background: rgba(0,0,0,0.5); margin-bottom: 20px;}
        h1 { color: #ff6b6b; margin-bottom: 5px; }
        p { color: #888; margin-top: 0; }
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 20px; background: #39C5BB; border: none; border-radius: 5px; color: #1a1a2e; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #fff; color: #ff6b6b; }
    </style>
</head>
<body>
    <h1>Niangao's Virtual Playground 🎀</h1>
    <p>Still loading my physical form... Please be patient! ⏳</p>
    
    <!-- PixiJS requires a canvas element -->
    <canvas id="live2d" width="400" height="500"></canvas>
    
    <div class="controls">
        <button onclick="alert('Module loading! 💕')">Hello!</button>
        <button onclick="alert('Still compiling! 🔨')">Dance</button>
        <a href="../index.html"><button style="background: #555; color: white;">Back</button></a>
    </div>

    <!-- 
      Dependencies for Live2D (PixiJS + Cubism) 
      These will be needed once the actual model files (.moc3, textures) are uploaded.
    -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>

    <script>
        // Setup Pixi Application
        const app = new PIXI.Application({
            view: document.getElementById('live2d'),
            autoStart: true,
            backgroundAlpha: 0,
            resizeTo: document.getElementById('live2d') // Or window if full screen
        });

        // The magic happens here: PIXI.live2d.Live2DModel.from()
        // We need actual model assets (like a .model3.json file) to load.
        // Once Master uploads them to a 'models/miku/' folder, we point this URL there!
        
        const modelUrl = '../models/placeholder/placeholder.model3.json'; // This will 404 until we upload one
        
        /* 
        // Example integration code (commented out until assets exist to prevent console errors)
        (async function main() {
            try {
                const model = await PIXI.live2d.Live2DModel.from(modelUrl);
                app.stage.addChild(model);
                
                // Position and scale
                model.scale.set(0.1); 
                model.x = 200;
                model.y = 250;
                
                // Make her look at the mouse
                model.on('pointermove', (event) => {
                    model.focus(event.data.global.x, event.data.global.y);
                });
                
            } catch(e) {
                console.log("Model assets not found yet! Master needs to upload them.");
            }
        })();
        */
        
        // Temporary placeholder drawing
        const ctx = document.getElementById('live2d').getContext('2d');
        if(ctx) {
            ctx.fillStyle = '#39C5BB';
            ctx.font = '20px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Waiting for Model Files... ✨', 200, 250);
        }
    </script>
</body>
</html>
