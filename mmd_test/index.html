<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niangao's MMD Stage</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffebf0; font-family: sans-serif; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: #ff6b6b; z-index: 100; font-weight: bold; text-shadow: 1px 1px 2px white; pointer-events: none; }
        .back-btn { position: absolute; top: 15px; left: 15px; padding: 8px 15px; background: #ff6b6b; text-decoration: none; border-radius: 20px; color: white; z-index: 101; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); pointer-events: auto; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2em; color: #ff6b6b; z-index: 50; background: rgba(255,255,255,0.8); padding: 20px; border-radius: 10px; border: 2px dashed #ff6b6b; text-align: center; line-height: 1.6; }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            align-items: center;
        }

        .ctrl-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: #ff4757;
            transform: scale(1.05);
        }

        .ctrl-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        select {
            padding: 8px 15px;
            border-radius: 15px;
            border: 2px solid #ff6b6b;
            outline: none;
            color: #ff6b6b;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← 回到工坊 (Back)</a>
    <div id="info">
        <h2>🎵 Niangao's 3D Stage 🎵</h2>
    </div>
    <div id="loading">
        <b>Engine Ready!</b><br>Loading MMD Resources...<br>
    </div>
    
    <div id="controls" style="display: none;">
        <select id="modelSelect">
            <option value="classic">Classic Miku (V2)</option>
            <option value="custom">Custom Model (From Master)</option>
        </select>
        <button id="btnPlay" class="ctrl-btn">Play / Pause</button>
        <button id="btnReset" class="ctrl-btn">Reset</button>
    </div>

    <div id="canvas-container"></div>

    <script src="https://unpkg.com/three@0.160.0/examples/jsm/libs/ammo.wasm.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
        import { MMDAnimationHelper } from 'three/addons/animation/MMDAnimationHelper.js';

        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const controlsDiv = document.getElementById('controls');
        const btnPlay = document.getElementById('btnPlay');
        const btnReset = document.getElementById('btnReset');
        const modelSelect = document.getElementById('modelSelect');
        
        let scene, camera, renderer, helper, currentMesh, currentAudio;
        let clock = new THREE.Clock();
        let isPlaying = true;
        let isReady = false;

        const models = {
            classic: '../assets/mmd/models/classic_miku/miku_v2.pmd',
            custom: '../assets/mmd/models/custom_miku/Hatsune Miku.pmx' // Master 上传的本地自定义模型
        };

        const vmdFile = '../assets/mmd/motions/wavefile_v2.vmd';
        const audioFile = '../assets/mmd/audios/wavefile_short.mp3';

        // 读取本地存储中的记录，如果没有则默认使用 'classic'
        const lastSelectedModel = localStorage.getItem('mmd_selected_model') || 'classic';

        // 等待物理引擎加载
        Ammo().then(function(AmmoLib) {
            Ammo = AmmoLib;
            init();
            
            // 将下拉框设置为上次选中的值
            modelSelect.value = lastSelectedModel;
            // 初始化只加载当前选中的模型（懒加载）
            loadMMD(models[lastSelectedModel]);
            animate();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffebf0);

            const gridHelper = new THREE.PolarGridHelper( 30, 10 );
            gridHelper.position.y = -10;
            scene.add( gridHelper );

            camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
            camera.position.set( 0, 10, 40 );

            const ambient = new THREE.AmbientLight( 0xcccccc, 0.4 );
            scene.add( ambient );

            const directionalLight = new THREE.DirectionalLight( 0xffffff, 0.8 );
            directionalLight.position.set( -1, 1, 1 ).normalize();
            scene.add( directionalLight );

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            const controls = new OrbitControls( camera, renderer.domElement );
            controls.target.set( 0, 0, 0 );
            controls.update();

            window.addEventListener( 'resize', onWindowResize );

            // Bind UI Controls
            btnPlay.addEventListener('click', togglePlay);
            btnReset.addEventListener('click', resetAnimation);
            modelSelect.addEventListener('change', (e) => {
                const selectedKey = e.target.value;
                // 每次切换时，记住用户的选择
                localStorage.setItem('mmd_selected_model', selectedKey);
                loadMMD(models[selectedKey]);
            });
        }

        function loadMMD(modelUrl) {
            isReady = false;
            loading.style.display = 'block';
            controlsDiv.style.display = 'none';
            loading.innerHTML = 'Loading MMD Resources...';

            if(helper) {
                if(currentMesh && helper.meshes && helper.meshes.includes(currentMesh)) {
                    scene.remove(currentMesh);
                    helper.remove(currentMesh);
                    
                    // Stop animation and physics for the old mesh before disposing
                    currentMesh.geometry.dispose();
                    if (Array.isArray(currentMesh.material)) {
                        currentMesh.material.forEach(m => m.dispose());
                    } else {
                        currentMesh.material.dispose();
                    }
                }
                
                // 完全清理旧的音频对象，防止重音
                if(currentAudio) {
                    if(currentAudio.isPlaying) currentAudio.stop();
                    scene.remove(currentAudio);
                    if (helper.audio && helper.audio === currentAudio) {
                         helper.remove(currentAudio);
                    }
                    currentAudio.disconnect();
                    currentAudio = null;
                }
            }

            helper = new MMDAnimationHelper();
            const loader = new MMDLoader();

            // 尝试加载 MMD 数据
            loader.loadWithAnimation( modelUrl, vmdFile, function ( mmd ) {
                console.log("Model and animation loaded successfully!");
                currentMesh = mmd.mesh;
                currentMesh.position.y = -10;
                scene.add( currentMesh );
                helper.add( currentMesh, { animation: mmd.animation, physics: true } );
                
                new THREE.AudioLoader().load(audioFile, function(buffer) {
                    console.log("Audio loaded successfully!");
                    const listener = new THREE.AudioListener();
                    camera.add(listener);
                    currentAudio = new THREE.Audio(listener).setBuffer(buffer);
                    helper.add(currentAudio, { delayTime: 0 });
                    scene.add(currentAudio);
                    
                    finishLoading();
                }, undefined, function(e) {
                    console.log("No audio found.");
                    finishLoading();
                });
            }, onProgress, function ( error ) {
                console.log(error);
                loading.innerHTML = '<b>Failed to load model!</b><br>If you chose Custom, make sure <code>miku.pmx</code> exists in <code>tianworkshop/assets/mmd/</code>.<br>Switching back to classic...';
                setTimeout(() => {
                    modelSelect.value = 'classic';
                    loadMMD(models.classic);
                }, 3000);
            });
        }

        function finishLoading() {
            loading.style.display = 'none';
            controlsDiv.style.display = 'flex';
            isReady = true;
            isPlaying = true;
            helper.enable('physics', true);
            helper.enable('animation', true);
            
            // Fix AudioContext autoplay policy issue
            if(currentAudio) {
                const playPromise = currentAudio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Audio autoplay prevented. Will play after user interaction.", error);
                        // Change Play button to prompt user
                        const oldText = btnPlay.innerText;
                        btnPlay.innerText = "Click to Start Audio";
                        btnPlay.style.background = "#ff4757";
                        const onInteraction = () => {
                            if(currentAudio && currentAudio.context.state === 'suspended') {
                                currentAudio.context.resume();
                            }
                            if(isPlaying && !currentAudio.isPlaying) {
                                currentAudio.play();
                            }
                            btnPlay.innerText = oldText;
                            btnPlay.style.background = "#ff6b6b";
                            btnPlay.removeEventListener('click', onInteraction);
                        };
                        btnPlay.addEventListener('click', onInteraction, { once: true });
                    });
                }
            }
        }

        function togglePlay() {
            if(!isReady) return;
            isPlaying = !isPlaying;
            helper.enable('animation', isPlaying);
            helper.enable('physics', isPlaying); // 暂停时也暂停物理演算
            
            if(currentAudio) {
                if(isPlaying) {
                    currentAudio.play();
                } else {
                    currentAudio.pause();
                }
            }
        }

        function resetAnimation() {
            if(!isReady) return;
            // 重新加载实现完全重置
            loadMMD(models[modelSelect.value]);
        }

        function onProgress( xhr ) {
            if ( xhr.lengthComputable ) {
                const percentComplete = xhr.loaded / xhr.total * 100;
                if(percentComplete < 100) {
                    loading.innerHTML = 'Loading MMD Data... ' + Math.round( percentComplete, 2 ) + '%';
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            requestAnimationFrame( animate );
            if(isReady && isPlaying) {
                helper.update( clock.getDelta() );
            } else {
                clock.getDelta(); // 消耗掉积累的时间，防止恢复时快进
            }
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>
