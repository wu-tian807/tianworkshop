<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niangao's MMD Stage</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffebf0; font-family: sans-serif; }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: #ff6b6b; z-index: 100; font-weight: bold; text-shadow: 1px 1px 2px white; pointer-events: none; }
        .back-btn { position: absolute; top: 15px; left: 15px; padding: 8px 15px; background: #ff6b6b; text-decoration: none; border-radius: 20px; color: white; z-index: 101; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); pointer-events: auto; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.2em; color: #ff6b6b; z-index: 50; background: rgba(255,255,255,0.8); padding: 20px; border-radius: 10px; border: 2px dashed #ff6b6b; text-align: center; line-height: 1.6; }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            align-items: center;
        }

        .ctrl-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            background: #ff4757;
            transform: scale(1.05);
        }

        .ctrl-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        select {
            padding: 8px 15px;
            border-radius: 15px;
            border: 2px solid #ff6b6b;
            outline: none;
            color: #ff6b6b;
            font-weight: bold;
            cursor: pointer;
        }
    
        .floating-notes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .note {
            position: absolute;
            font-size: 24px;
            color: #ff6b6b;
            opacity: 0;
            animation: float-up 4s linear infinite;
        }
        
        .sakura-petal {
            position: absolute;
            background: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.8;
            pointer-events: none;
            z-index: 11;
            animation: fall linear infinite, sway ease-in-out infinite alternate;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
        
        @keyframes fall {
            0% { transform: translateY(-10vh) rotateZ(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotateZ(360deg); opacity: 0; }
        }
        
        @keyframes sway {
            0% { margin-left: -20px; }
            100% { margin-left: 20px; }
        }
    
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← 回到工坊 (Back)</a>
    <div id="info">
        <h2>🎵 Niangao's 3D Stage 🎵</h2>
    </div>
    <div id="loading">
        <b>Engine Ready!</b><br>Loading MMD Resources...<br>
    </div>
    
    <div id="controls" style="display: none;">
        <select id="modelSelect">
            <option value="classic">Classic Miku (V2)</option>
            <option value="lat_summer">Lat式 Miku (夏服) ☀️</option>
            <option value="custom">Custom Model (From Master)</option>
        </select>
        <select id="motionSelect">
            <option value="wavefile">Wavefile (Default)</option>
            <option value="senbonzakura">千本樱 (Senbonzakura) 🌸</option>
            <option value="gokuraku">极乐净土 (Gokuraku Jodo) 🦋</option>
            <option value="nekomimi">猫耳开关 (Nekomimi Switch) 🐱</option>
        </select>
        <button id="btnPlay" class="ctrl-btn">Play / Pause</button>
        <button id="btnReset" class="ctrl-btn">Reset</button>
    </div>

    <div id="canvas-container"></div>

    <script src="https://unpkg.com/three@0.160.0/examples/jsm/libs/ammo.wasm.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { MMDLoader } from 'three/addons/loaders/MMDLoader.js';
        import { MMDAnimationHelper } from 'three/addons/animation/MMDAnimationHelper.js';
        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const controlsDiv = document.getElementById('controls');
        const btnPlay = document.getElementById('btnPlay');
        const btnReset = document.getElementById('btnReset');
        const modelSelect = document.getElementById('modelSelect');
        const motionSelect = document.getElementById('motionSelect');
        
        let scene, camera, renderer, helper, currentMesh, currentAudio, cameraLight;
        let clock = new THREE.Clock();
        let isPlaying = true;
        let isReady = false;

        const models = {
            classic: '../assets/mmd/models/classic_miku/miku_v2.pmd',
            lat_summer: '../assets/mmd/models/lat_miku/Lat式ミクVer2.31_Sailor夏服.pmd',
            custom: '../assets/mmd/models/custom_miku/Hatsune_Miku.pmx'
        };

        const motions = {
            wavefile: { vmd: '../assets/mmd/motions/wavefile_v2.vmd', audio: '../assets/mmd/audios/wavefile_short.mp3' },
            senbonzakura: { vmd: '../assets/mmd/motions/senbonzakura.vmd', audio: '../assets/mmd/audios/senbonzakura.mp3' },
            gokuraku: { vmd: '../assets/mmd/motions/gokuraku_jodo.vmd', audio: '../assets/mmd/audios/gokuraku_jodo.mp3' },
            nekomimi: { vmd: '../assets/mmd/motions/nekomimi_switch.vmd', audio: '../assets/mmd/audios/nekomimi_switch.mp3' }
        };

        const lastSelectedModel = localStorage.getItem('mmd_selected_model') || 'classic';
        const lastSelectedMotion = localStorage.getItem('mmd_selected_motion') || 'wavefile';

        // 等待物理引擎加载
        Ammo().then(function(AmmoLib) {
            Ammo = AmmoLib;
            init();
            
            // 将下拉框设置为上次选中的值
            modelSelect.value = lastSelectedModel;
            if (motions[lastSelectedMotion]) {
                motionSelect.value = lastSelectedMotion;
            }
            
            // 初始化只加载当前选中的模型和动作（懒加载）
            const selectedMotion = motions[motionSelect.value];
            loadMMD(models[modelSelect.value], selectedMotion.vmd, selectedMotion.audio);
            animate();
        });

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffebf0);

            const gridHelper = new THREE.PolarGridHelper( 30, 10 );
            gridHelper.position.y = -10;
            scene.add( gridHelper );

            camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 1, 2000 );
            camera.position.set( 0, 10, 40 );

            // 环境光：提供基础亮度
            const ambient = new THREE.AmbientLight( 0xffffff, 0.4 );
            scene.add( ambient );

            // 主方向光：提供基础方向感
            const directionalLight = new THREE.DirectionalLight( 0xffffff, 0.3 );
            directionalLight.position.set( -1, 1, 1 ).normalize();
            scene.add( directionalLight );

            // 摄像机跟随点光源
            cameraLight = new THREE.PointLight( 0xffffff, 0.5, 150, 1.5 );
            cameraLight.position.copy( camera.position );
            scene.add( cameraLight );

            // 舞台聚光灯 (Concert Spotlight)
            const spotLight = new THREE.SpotLight( 0x39C5BB, 500 );
            spotLight.position.set( 0, 30, 20 );
            spotLight.angle = Math.PI / 6;
            spotLight.penumbra = 0.3;
            spotLight.decay = 2;
            spotLight.distance = 100;
            spotLight.castShadow = true;
            scene.add( spotLight );
            
            const spotLight2 = new THREE.SpotLight( 0xff6b6b, 500 );
            spotLight2.position.set( 0, 30, -20 );
            spotLight2.angle = Math.PI / 6;
            spotLight2.penumbra = 0.3;
            spotLight2.decay = 2;
            spotLight2.distance = 100;
            spotLight2.castShadow = true;
            scene.add( spotLight2 );

            // 舞台底板 (Stage Floor)
            const floorGeometry = new THREE.CylinderGeometry( 20, 22, 2, 32 );
            const floorMaterial = new THREE.MeshPhysicalMaterial({ 
                color: 0x111111,
                metalness: 0.8,
                roughness: 0.2,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1
            });
            const floor = new THREE.Mesh( floorGeometry, floorMaterial );
            floor.position.y = -11;
            floor.receiveShadow = true;
            scene.add( floor );

            // Rotating stage ring
            const ringGeo = new THREE.TorusGeometry( 22, 0.5, 16, 100 );
            const ringMat = new THREE.MeshBasicMaterial( { color: 0x39C5BB } );
            const ring = new THREE.Mesh( ringGeo, ringMat );
            ring.position.y = -10;
            ring.rotation.x = Math.PI / 2;
            scene.add( ring );
            
            // Assign to global for animation
            window.stageRing = ring;
            window.spotLight = spotLight;
            window.spotLight2 = spotLight2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            container.appendChild( renderer.domElement );

            const controls = new OrbitControls( camera, renderer.domElement );
            controls.target.set( 0, 0, 0 );
            controls.update();

            window.addEventListener( 'resize', onWindowResize );

            // Bind UI Controls
            btnPlay.addEventListener('click', togglePlay);
            btnReset.addEventListener('click', resetAnimation);
            modelSelect.addEventListener('change', (e) => {
                const selectedKey = e.target.value;
                localStorage.setItem('mmd_selected_model', selectedKey);
                const selectedMotion = motions[motionSelect.value];
                loadMMD(models[selectedKey], selectedMotion.vmd, selectedMotion.audio);
            });
            motionSelect.addEventListener('change', (e) => {
                const selectedMotionKey = e.target.value;
                localStorage.setItem('mmd_selected_motion', selectedMotionKey);
                const selectedMotion = motions[selectedMotionKey];
                loadMMD(models[modelSelect.value], selectedMotion.vmd, selectedMotion.audio);
            });
        }

        function loadMMD(modelUrl, vmdUrl, audioUrl) {
            isReady = false;
            loading.style.display = 'block';
            controlsDiv.style.display = 'none';
            loading.innerHTML = 'Loading MMD Resources...';

            if(helper) {
                if(currentMesh && helper.meshes && helper.meshes.includes(currentMesh)) {
                    scene.remove(currentMesh);
                    helper.remove(currentMesh);
                    
                    // Stop animation and physics for the old mesh before disposing
                    currentMesh.geometry.dispose();
                    if (Array.isArray(currentMesh.material)) {
                        currentMesh.material.forEach(m => m.dispose());
                    } else {
                        currentMesh.material.dispose();
                    }
                }
                
                // 完全清理旧的音频对象，防止重音
                if(currentAudio) {
                    if(currentAudio.isPlaying) currentAudio.stop();
                    scene.remove(currentAudio);
                    if (helper.audio && helper.audio === currentAudio) {
                         helper.remove(currentAudio);
                    }
                    currentAudio.disconnect();
                    currentAudio = null;
                }
            }

            helper = new MMDAnimationHelper();
            const loader = new MMDLoader();

            // 尝试加载 MMD 数据
            loader.loadWithAnimation( modelUrl, vmdUrl, function ( mmd ) {
                console.log("Model and animation loaded successfully!");
                currentMesh = mmd.mesh;
                
                // Disable frustum culling to prevent geometry disappearing when camera moves
                currentMesh.frustumCulled = false;
                
                // 修复脸部"黑洞"问题：
                // MMD toon 着色使用梯度贴图（gradientMap）决定明暗分界。
                // 默认的 toon02.bmp 梯度非常硬（从纯白直接跳到深黑），
                // 导致脸颊/下巴/鼻梁等侧向法线区域被渲染成近纯黑——看起来像"空洞"。
                // 解决方案：创建一个更柔和的渐变贴图替换所有材质的 gradientMap，
                // 让暗部最低保留 ~45% 亮度而不是接近 0。
                const softGradient = (() => {
                    const w = 256;
                    const data = new Uint8Array(w * 4);
                    for (let i = 0; i < w; i++) {
                        // 极平坦梯度：[210,255]，消除低多边形面片之间的三角形阴影跳变
                        const v = Math.round(210 + (i / (w - 1)) * 45);
                        data[i * 4 + 0] = v;
                        data[i * 4 + 1] = v;
                        data[i * 4 + 2] = v;
                        data[i * 4 + 3] = 255;
                    }
                    const tex = new THREE.DataTexture(data, w, 1, THREE.RGBAFormat);
                    tex.minFilter = THREE.LinearFilter;
                    tex.magFilter = THREE.LinearFilter;
                    tex.needsUpdate = true;
                    return tex;
                })();

                const mats = Array.isArray(currentMesh.material)
                    ? currentMesh.material : [currentMesh.material];
                mats.forEach(m => {
                    // 修复透明穿透：PMD 所有材质 alpha=1.0，强制不透明
                    if (m.opacity >= 1.0) {
                        m.transparent = false;
                        m.depthWrite = true;
                    }

                    // 替换 toon 梯度贴图为柔和版本
                    if (m.uniforms && m.uniforms.gradientMap) {
                        m.uniforms.gradientMap.value = softGradient;
                    }

                    // 修复眼睛黑圈：
                    // 眼睑/睫毛材质 diffuse 极深（≈0.12），经过光照计算后接近纯黑。
                    // 对深色但非纯黑材质加 emissive 自发光，让眼睑保留可见层次感。
                    // 纯黑材质（眉毛/睫毛线条）保持不变，避免变灰失去边界感。
                    if (m.color && m.uniforms && m.uniforms.emissive) {
                        const luma = m.color.r * 0.3 + m.color.g * 0.59 + m.color.b * 0.11;
                        if (luma > 0.05 && luma < 0.25) {
                            // 深色非纯黑材质（眼睑区域）：加自发光提亮
                            m.uniforms.emissive.value.setRGB(0.09, 0.09, 0.09);
                        }
                    }

                    m.needsUpdate = true;
                });

                currentMesh.position.y = -10;
                scene.add( currentMesh );
                helper.add( currentMesh, { 
                    animation: mmd.animation, 
                    physics: true
                } );
                
                new THREE.AudioLoader().load(audioUrl, function(buffer) {
                    console.log("Audio loaded successfully!");
                    const listener = new THREE.AudioListener();
                    camera.add(listener);
                    currentAudio = new THREE.Audio(listener).setBuffer(buffer);
                    helper.add(currentAudio, { delayTime: 0 });
                    scene.add(currentAudio);
                    
                    finishLoading();
                }, undefined, function(e) {
                    console.log("No audio found.");
                    finishLoading();
                });
            }, onProgress, function ( error ) {
                console.log(error);
                loading.innerHTML = '<b>Failed to load resource!</b><br>Make sure the .pmx/.vmd/.mp3 files are in the right folders in <code>tianworkshop/assets/mmd/</code>.<br>Switching back to default...';
                setTimeout(() => {
                    modelSelect.value = 'classic';
                    motionSelect.value = 'wavefile';
                    const fallbackMotion = motions['wavefile'];
                    loadMMD(models.classic, fallbackMotion.vmd, fallbackMotion.audio);
                }, 4000);
            });
        }

        let userHasInteracted = false;
        
        // Track global interactions to bypass autoplay policy gracefully
        document.body.addEventListener('click', () => { userHasInteracted = true; }, { once: true });
        document.body.addEventListener('touchstart', () => { userHasInteracted = true; }, { once: true });

        function finishLoading() {
            loading.style.display = 'none';
            controlsDiv.style.display = 'flex';
            isReady = true;
            isPlaying = true;
            helper.enable('physics', true);
            helper.enable('animation', true);
            
            if(currentAudio) {
                // If user already clicked something (like changing a dropdown), 
                // the AudioContext is likely unlocked, but we still handle the promise.
                const playPromise = currentAudio.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Audio autoplay prevented. Will play after user interaction.", error);
                        // Force pause animation so it stays synced with audio
                        isPlaying = false;
                        helper.enable('animation', false);
                        helper.enable('physics', false);
                        
                        const oldText = btnPlay.innerText;
                        btnPlay.innerText = "Click to Start 🎵";
                        btnPlay.style.background = "#ff4757";
                        btnPlay.style.transform = "scale(1.1)";
                        btnPlay.style.animation = "pulse 1.5s infinite";
                        
                        const onInteraction = () => {
                            if(currentAudio && currentAudio.context.state === 'suspended') {
                                currentAudio.context.resume();
                            }
                            isPlaying = true;
                            helper.enable('animation', true);
                            helper.enable('physics', true);
                            currentAudio.play();
                            
                            btnPlay.innerText = "Play / Pause";
                            btnPlay.style.background = "#ff6b6b";
                            btnPlay.style.transform = "none";
                            btnPlay.style.animation = "none";
                            btnPlay.removeEventListener('click', onInteraction);
                        };
                        btnPlay.addEventListener('click', onInteraction, { once: true });
                    });
                }
            }
        }

        function togglePlay() {
            if(!isReady) return;
            isPlaying = !isPlaying;
            helper.enable('animation', isPlaying);
            helper.enable('physics', isPlaying); // 暂停时也暂停物理演算
            
            if(currentAudio) {
                if(isPlaying) {
                    currentAudio.play();
                } else {
                    currentAudio.pause();
                }
            }
        }

        function resetAnimation() {
            if(!isReady) return;
            // 重新加载实现完全重置
            const selectedMotion = motions[motionSelect.value];
            loadMMD(models[modelSelect.value], selectedMotion.vmd, selectedMotion.audio);
        }

        function onProgress( xhr ) {
            if ( xhr.lengthComputable ) {
                const percentComplete = xhr.loaded / xhr.total * 100;
                if(percentComplete < 100) {
                    loading.innerHTML = 'Loading MMD Data... ' + Math.round( percentComplete, 2 ) + '%';
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            requestAnimationFrame( animate );
            
            const delta = clock.getDelta();
            const time = clock.elapsedTime;
            
            // 舞台特效动画
            if (window.stageRing) {
                window.stageRing.rotation.z += 0.01;
                // 色彩呼吸
                window.stageRing.material.color.setHSL((time * 0.1) % 1, 0.8, 0.5);
            }
            if (window.spotLight && window.spotLight2) {
                window.spotLight.position.x = Math.sin(time) * 30;
                window.spotLight.position.z = Math.cos(time) * 30;
                window.spotLight.color.setHSL((time * 0.2) % 1, 1, 0.5);
                
                window.spotLight2.position.x = Math.cos(time) * 30;
                window.spotLight2.position.z = Math.sin(time) * 30;
                window.spotLight2.color.setHSL(((time * 0.2) + 0.5) % 1, 1, 0.5);
            }

            // 摄像机点光源跟随镜头位置，拖近时正面补光增强
            if ( cameraLight ) cameraLight.position.copy( camera.position );
            if(isReady && isPlaying) {
                helper.update( delta );
            }
            renderer.render( scene, camera );
        }
    
        // Floating Notes Effect
        const notesContainer = document.createElement('div');
        notesContainer.className = 'floating-notes';
        document.body.appendChild(notesContainer);
        const noteSymbols = ['🎵', '🎶', '✨', '🌸', '💖'];
        
        function createNote() {
            if(!isPlaying) return;
            const note = document.createElement('div');
            note.className = 'note';
            note.innerText = noteSymbols[Math.floor(Math.random() * noteSymbols.length)];
            note.style.left = Math.random() * 100 + 'vw';
            note.style.animationDuration = (Math.random() * 2 + 3) + 's';
            note.style.fontSize = (Math.random() * 20 + 15) + 'px';
            notesContainer.appendChild(note);
            
            setTimeout(() => {
                note.remove();
            }, 5000);
        }
        setInterval(createNote, 800);
        
        // Sakura Falling Effect (Only for Senbonzakura or random)
        function createSakura() {
            if (!isPlaying || motionSelect.value !== 'senbonzakura') return;
            const petal = document.createElement('div');
            petal.className = 'sakura-petal';
            
            // Randomize size, position, and duration
            const size = Math.random() * 10 + 5; // 5-15px
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            petal.style.left = Math.random() * 100 + 'vw';
            
            const duration = Math.random() * 3 + 4; // 4-7s
            petal.style.animationDuration = duration + 's, ' + (Math.random() * 2 + 1) + 's'; // fall, sway
            
            notesContainer.appendChild(petal);
            
            setTimeout(() => {
                petal.remove();
            }, duration * 1000);
        }
        setInterval(createSakura, 300);
    
    </script>
</body>
</html>
